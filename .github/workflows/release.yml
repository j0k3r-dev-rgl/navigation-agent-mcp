name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ──────────────────────────────────────────────
  # Compile Rust binary for each target platform
  # ──────────────────────────────────────────────
  build-rust:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: mcp-server-linux-x64
            binary: navigation-engine

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            npm-pkg: mcp-server-linux-arm64
            binary: navigation-engine

          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: mcp-server-darwin-x64
            binary: navigation-engine

          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: mcp-server-darwin-arm64
            binary: navigation-engine

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: mcp-server-win32-x64
            binary: navigation-engine.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux arm64 cross-compilation via `cross`
      - name: Install cross (Linux arm64 only)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} --manifest-path crates/navigation-engine/Cargo.toml --target-dir ./target

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/navigation-engine/Cargo.toml --target-dir ./target

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Compile TypeScript + publish all packages
  # ──────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm provenance
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --ignore-platform

      - name: Set version from git tag
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Build TypeScript
        run: npm run mcp-server:build

      - name: Download all Rust binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy binaries into platform packages
        run: |
          cp artifacts/binary-mcp-server-linux-x64/navigation-engine   packages/mcp-server-linux-x64/navigation-engine
          cp artifacts/binary-mcp-server-linux-arm64/navigation-engine  packages/mcp-server-linux-arm64/navigation-engine
          cp artifacts/binary-mcp-server-darwin-x64/navigation-engine   packages/mcp-server-darwin-x64/navigation-engine
          cp artifacts/binary-mcp-server-darwin-arm64/navigation-engine packages/mcp-server-darwin-arm64/navigation-engine
          cp artifacts/binary-mcp-server-win32-x64/navigation-engine.exe packages/mcp-server-win32-x64/navigation-engine.exe
          chmod +x packages/mcp-server-linux-x64/navigation-engine
          chmod +x packages/mcp-server-linux-arm64/navigation-engine
          chmod +x packages/mcp-server-darwin-x64/navigation-engine
          chmod +x packages/mcp-server-darwin-arm64/navigation-engine

      # Platform packages must be published BEFORE the main package
      - name: Publish platform packages
        run: |
          npm publish --workspace @navigation-agent/mcp-server-linux-x64  --access public
          npm publish --workspace @navigation-agent/mcp-server-linux-arm64 --access public
          npm publish --workspace @navigation-agent/mcp-server-darwin-x64  --access public
          npm publish --workspace @navigation-agent/mcp-server-darwin-arm64 --access public
          npm publish --workspace @navigation-agent/mcp-server-win32-x64   --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --workspace @navigation-agent/mcp-server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
